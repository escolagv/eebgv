<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEBGV - Encaminhamento</title>
    <link rel="icon" type="image/x-icon" href="../apoia/favicon.ico">
    <link rel="apple-touch-icon" href="../apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="96x96" href="../favicon-96x96.png">
    <link rel="manifest" href="../apoia/site.webmanifest">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-lg shadow-md">
            <img src="../apoia/logo.png" alt="Logo Escola" class="w-28 h-28 mx-auto">
            <h1 class="text-2xl font-bold text-center text-gray-900">Encaminhamentos</h1>
            <p class="text-center text-sm text-gray-500">Sistema da Orientação</p>
            <form id="login-form" class="space-y-6">
                <div>
                    <label for="login-email" class="text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="login-email" required data-keep-case="true" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" autocomplete="email">
                </div>
                <div class="relative">
                    <label for="login-password" class="text-sm font-medium text-gray-700">Senha</label>
                    <input type="password" id="login-password" required data-keep-case="true" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 pr-10" autocomplete="current-password">
                    <button type="button" id="login-password-toggle" class="absolute right-3 top-9 text-gray-500 hover:text-gray-700" aria-label="Mostrar senha">
                        <svg id="login-password-eye" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
                            <circle cx="12" cy="12" r="3" stroke-width="2"/>
                        </svg>
                        <svg id="login-password-eye-off" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18M10.58 10.58A2 2 0 0112 10c1.1 0 2 .9 2 2 0 .47-.16.9-.42 1.24M6.7 6.7C4.35 8.2 3 10.5 3 10.5s3.5 6.5 9 6.5c1.6 0 3.04-.35 4.3-.93M14 8.1c-.63-.32-1.31-.5-2-.5-1.12 0-2.17.3-3.1.82M21 10.5s-1.02 1.9-3 3.37"/>
                        </svg>
                    </button>
                </div>
                <button type="submit" id="login-btn" class="w-full py-2 px-4 font-semibold text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Entrar</button>
                <p id="login-error" class="text-sm text-center text-red-600"></p>
            </form>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
