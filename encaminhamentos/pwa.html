<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEBGV - Encaminhamento</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-md text-center space-y-4">
            <h1 class="text-xl font-bold">Captura de Encaminhamentos</h1>
            <p id="pwa-status" class="text-sm text-gray-500">Aguardando validação...</p>
            <div id="pwa-token" class="text-xs text-gray-400 break-all"></div>

            <div id="capture-area" class="hidden space-y-3">
                <button id="open-camera-btn" class="w-full px-4 py-2 text-sm font-semibold text-white bg-blue-600 rounded-md hover:bg-blue-700">
                    Abrir câmera
                </button>

                <video id="camera-preview" class="hidden w-full rounded-md border border-gray-200" autoplay playsinline></video>
                <canvas id="capture-canvas" class="hidden w-full rounded-md border border-gray-200"></canvas>

                <div class="flex gap-2">
                    <button id="capture-btn" class="hidden flex-1 px-4 py-2 text-sm font-semibold text-white bg-green-600 rounded-md hover:bg-green-700">
                        Capturar
                    </button>
                    <button id="retake-btn" class="hidden flex-1 px-4 py-2 text-sm font-semibold text-gray-700 bg-gray-200 rounded-md hover:bg-gray-300">
                        Refazer
                    </button>
                </div>

                <div class="text-xs text-gray-400">Ou escolha uma foto:</div>
                <input id="file-input" type="file" accept="image/*" capture="environment" class="block w-full text-sm">

                <button id="upload-btn" class="hidden w-full px-4 py-2 text-sm font-semibold text-white bg-emerald-600 rounded-md hover:bg-emerald-700">
                    Enviar para a fila
                </button>

                <div id="upload-status" class="text-xs text-gray-500"></div>
            </div>
        </div>
    </div>

    <script type="module" src="pwa.js"></script>
</body>
</html>
