<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fila de Scans</title>
    <link rel="icon" type="image/x-icon" href="../apoia/favicon.ico">
    <link rel="apple-touch-icon" href="../apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="96x96" href="../favicon-96x96.png">
    <link rel="manifest" href="../apoia/site.webmanifest">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>
<body class="bg-gray-200 text-gray-800">
    <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-20 md:hidden"></div>
    <div class="flex h-screen bg-gray-200">
        <aside class="w-64 bg-gray-800 text-white flex flex-col fixed inset-y-0 left-0 z-30 transform -translate-x-full transition-transform duration-300 ease-in-out md:relative md:translate-x-0">
            <div class="p-4 border-b border-gray-700 flex flex-col items-center gap-3">
                <img src="../apoia/logo_admin.png" alt="Logo da Escola" class="h-16">
                <div>
                    <h1 class="text-xl font-bold text-center">Encaminhamentos</h1>
                    <p id="user-name" class="text-sm text-gray-400 text-center">-</p>
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <a href="dashboard.html" class="block px-4 py-2 rounded-md hover:bg-gray-700">Dashboard</a>
                <a href="encaminhamento.html" class="block px-4 py-2 rounded-md hover:bg-gray-700">Registrar</a>
                <a href="consulta.html" class="block px-4 py-2 rounded-md hover:bg-gray-700">Consultar</a>
                <a href="relatorios.html" class="block px-4 py-2 rounded-md hover:bg-gray-700">Relatórios</a>
                <a href="cadastros.html" class="block px-4 py-2 rounded-md hover:bg-gray-700">Cadastros</a>
                <a href="fila.html" class="block px-4 py-2 rounded-md bg-gray-700">Fila de Scans</a>
            </nav>
            <div class="p-4 border-t border-gray-700 space-y-4">
                <div class="text-xs text-center text-gray-400">
                    <img src="../apoia/qr_code_altnix.png" alt="QR Code Altnix" class="h-16 mx-auto mb-2">
                    <p>Desenvolvido por:</p>
                    <p>Altnix Tecnologia</p>
                    <p>WhatsApp: (48) 99100-4780</p>
                    <a href="#" id="support-link-enc" class="text-blue-400 hover:underline">Suporte Técnico</a>
                </div>
                <div id="enc-app-version" class="text-xs text-center text-gray-400" data-version="1.0.6">V1.0.6</div>
                <button id="logout-btn" class="w-full px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700">Sair</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <button id="mobile-menu-btn" class="text-gray-600 hover:text-gray-800 md:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                    <button id="queue-refresh-btn" class="px-3 py-1.5 text-xs font-semibold text-blue-700 bg-blue-100 rounded-md hover:bg-blue-200">Atualizar</button>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-md">
                    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                        <div>
                            <h2 class="text-2xl font-bold">Fila de Scans</h2>
                            <p class="text-sm text-gray-500">Selecione uma foto para abrir no cadastro.</p>
                        </div>
                        <div class="text-sm text-gray-500">
                            Total: <strong id="queue-count">0</strong>
                        </div>
                    </div>

                    <div id="queue-list" class="mt-6 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" defer></script>
    <script type="module" src="fila.js"></script>

    <div id="zoom-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 px-4">
        <div class="bg-white rounded-lg shadow-xl p-4 w-full max-w-3xl">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm font-semibold text-gray-700">Zoom da imagem</h3>
                <button id="zoom-close-btn" class="text-gray-500 hover:text-gray-700 text-lg">&times;</button>
            </div>
            <div class="flex flex-wrap gap-2 mb-3">
                <button id="zoom-in-btn" class="px-3 py-1.5 text-xs font-semibold text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200">Zoom +</button>
                <button id="zoom-out-btn" class="px-3 py-1.5 text-xs font-semibold text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200">Zoom -</button>
                <button id="zoom-reset-btn" class="px-3 py-1.5 text-xs font-semibold text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200">Reset</button>
                <button id="zoom-print-btn" type="button" class="px-3 py-1.5 text-xs font-semibold text-blue-700 bg-blue-100 rounded-md hover:bg-blue-200">Imprimir</button>
            </div>
            <div class="bg-gray-50 border border-gray-200 rounded-md p-2 overflow-auto max-h-[70vh]">
                <img id="zoom-image" alt="Imagem ampliada" class="mx-auto transition-transform duration-200" style="transform: scale(1);" />
            </div>
        </div>
    </div>
</body>
</html>
