<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Encaminhamentos</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <header class="bg-white shadow-md p-3 grid grid-cols-[auto_1fr_auto] items-center gap-2">
        <div class="flex items-center gap-3">
            <img src="../apoia/logo.png" alt="Logo Escola" class="h-12 w-12">
            <div>
                <h1 class="text-lg font-bold leading-tight">Encaminhamentos</h1>
                <p class="text-xs text-gray-500">Consulta</p>
            </div>
        </div>
        <nav class="flex flex-wrap justify-center gap-3 text-sm font-semibold">
            <a href="dashboard.html" class="text-gray-600 hover:text-blue-600">Dashboard</a>
            <a href="encaminhamento.html" class="text-gray-600 hover:text-blue-600">Registrar</a>
            <a href="consulta.html" class="text-blue-600 nav-link-active">Consultar</a>
            <a href="relatorios.html" class="text-gray-600 hover:text-blue-600">Relatórios</a>
        </nav>
        <div class="flex items-center gap-3 justify-end">
            <div class="text-right">
                <p class="text-xs text-gray-500">Usuário</p>
                <p class="text-sm font-semibold" id="user-name">-</p>
            </div>
            <button type="button" id="logout-btn" class="px-3 py-1.5 text-xs font-medium text-white bg-red-600 rounded-md hover:bg-red-700">Sair</button>
        </div>
    </header>

    <div class="px-4 py-6 max-w-4xl mx-auto">
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold text-gray-900">Consultar Encaminhamentos</h2>
            <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="search-estudante" class="text-sm font-medium text-gray-700">Buscar por Estudante</label>
                    <input type="text" id="search-estudante" placeholder="Parte do nome..." class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="search-professor" class="text-sm font-medium text-gray-700">Buscar por Professor(a)</label>
                    <input type="text" id="search-professor" placeholder="Parte do nome..." class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="search-data" class="text-sm font-medium text-gray-700">Buscar por Data</label>
                    <input type="date" id="search-data" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="search-registrado" class="text-sm font-medium text-gray-700">Buscar por Quem Registrou</label>
                    <input type="text" id="search-registrado" placeholder="Parte do nome..." class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>
            <button type="button" id="search-button" class="w-full mt-6 py-2 px-4 font-semibold text-white bg-blue-600 rounded-md hover:bg-blue-700">Buscar Encaminhamentos</button>
        </div>
    </div>

    <script type="module" src="consulta.js"></script>
</body>
</html>
