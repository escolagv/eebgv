<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Encaminhamentos</title>
    <link rel="icon" type="image/x-icon" href="../apoia/favicon.ico">
    <link rel="apple-touch-icon" href="../apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="96x96" href="../favicon-96x96.png">
    <link rel="manifest" href="../apoia/site.webmanifest">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>
<body class="bg-gray-200 text-gray-800">
    <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-20 md:hidden"></div>
    <div class="flex h-screen bg-gray-200">
        <aside class="w-64 bg-gray-800 text-white flex flex-col fixed inset-y-0 left-0 z-30 transform -translate-x-full transition-transform duration-300 ease-in-out md:relative md:translate-x-0">
            <div class="p-4 border-b border-gray-700 flex flex-col items-center gap-3">
                <img src="../apoia/logo_admin.png" alt="Logo da Escola" class="h-16">
                <div>
                    <h1 class="text-xl font-bold text-center">Encaminhamentos</h1>
                    <p id="user-name" class="text-sm text-gray-400 text-center">-</p>
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <a href="dashboard.html" class="block px-4 py-2 rounded-md hover:bg-gray-700">Dashboard</a>
                <a href="encaminhamento.html" class="block px-4 py-2 rounded-md hover:bg-gray-700">Registrar</a>
                <a href="consulta.html" class="block px-4 py-2 rounded-md bg-gray-700">Consultar</a>
                <a href="relatorios.html" class="block px-4 py-2 rounded-md hover:bg-gray-700">Relatórios</a>
            </nav>
            <div class="p-4 border-t border-gray-700 space-y-4">
                <div class="text-xs text-center text-gray-400">
                    <img src="../apoia/qr_code_altnix.png" alt="QR Code Altnix" class="h-16 mx-auto mb-2">
                    <p>Desenvolvido por:</p>
                    <p>Altnix Tecnologia</p>
                    <p>WhatsApp: (48) 99100-4780</p>
                    <a href="#" id="support-link-enc" class="text-blue-400 hover:underline">Suporte Técnico</a>
                </div>
                <div id="enc-app-version" class="text-xs text-center text-gray-400" data-version="1.0.5">V1.0.5</div>
                <button id="logout-btn" class="w-full px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700">Sair</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <button id="mobile-menu-btn" class="text-gray-600 hover:text-gray-800 md:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-md">
                    <h2 class="text-2xl font-bold mb-4">Consultar Encaminhamentos</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="search-estudante" class="text-sm font-medium text-gray-700">Buscar por Estudante</label>
                            <input type="text" id="search-estudante" placeholder="Parte do nome..." class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label for="search-professor" class="text-sm font-medium text-gray-700">Buscar por Professor(a)</label>
                            <input type="text" id="search-professor" placeholder="Parte do nome..." class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label for="search-data" class="text-sm font-medium text-gray-700">Buscar por Data</label>
                            <input type="date" id="search-data" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label for="search-registrado" class="text-sm font-medium text-gray-700">Buscar por Quem Registrou</label>
                            <input type="text" id="search-registrado" placeholder="Parte do nome..." class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>
                    <button type="button" id="search-button" class="w-full mt-6 py-2 px-4 font-semibold text-white bg-blue-600 rounded-md hover:bg-blue-700">Buscar Encaminhamentos</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/sidebar.js"></script>
    <script type="module" src="consulta.js"></script>
</body>
</html>
