<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEBGV - Encaminhamento</title>
    <link rel="stylesheet" href="print.css">
</head>
<body>
    <div class="report-container">
        <header>
            <h1 id="report-title">Ficha de Encaminhamento</h1>
            <p id="report-date"></p>
            <p id="report-summary"></p>
        </header>
        <main id="report-main-content">
            <!-- O conteúdo do relatório será inserido aqui pelo script -->
        </main>
        <footer>
            <p>Relatório gerado pelo Sistema de Encaminhamentos da Orientação</p>
        </footer>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const resultsData = JSON.parse(localStorage.getItem('searchResults'));
            const summary = localStorage.getItem('searchSummary');
            const reportType = localStorage.getItem('reportType') || 'simple';
            const reportLayout = localStorage.getItem('reportLayout') || 'single';

            if (resultsData && resultsData.length > 0) {
                document.getElementById('report-date').textContent = `Gerado em: ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR')}`;
                document.getElementById('report-summary').textContent = summary || '';

                let contentHTML = '';
                if (reportType === 'simple') {
                    document.body.classList.add('simple-report');
                    document.getElementById('report-title').textContent = 'Relatório Simples de Encaminhamentos';
                    contentHTML = buildSimpleReport(resultsData);
                    injectPageStyle('landscape');
                } else {
                    document.getElementById('report-title').textContent = 'Ficha de Encaminhamento';
                    contentHTML = buildFichaReport(resultsData, reportLayout);
                    if (reportLayout === 'double') {
                        document.body.classList.add('report-double');
                        injectPageStyle('landscape');
                    } else {
                        document.body.classList.add('report-single');
                    }
                }
                document.getElementById('report-main-content').innerHTML = contentHTML;

                localStorage.removeItem('searchResults');
                localStorage.removeItem('searchSummary');
                localStorage.removeItem('reportType');
                localStorage.removeItem('reportLayout');

                setTimeout(() => { window.print(); }, 500);
            } else {
                document.getElementById('report-main-content').innerHTML = "<p>Nenhum dado encontrado para gerar o relatório.</p>";
            }
        });

        function injectPageStyle(mode) {
            const style = document.createElement('style');
            if (mode === 'landscape') {
                style.textContent = '@page { size: A4 landscape; margin: 12mm; }';
            }
            document.head.appendChild(style);
        }

        function parseList(value) {
            if (!value) return [];
            return value.split(', ').map(v => v.trim()).filter(Boolean);
        }

        function checkbox(label, checked) {
            return `<div class="checkbox-line">(${checked ? 'x' : ' '}) ${label}</div>`;
        }

        function buildSimpleReport(data) {
            const grouped = new Map();
            data.forEach(item => {
                const key = `${item.aluno_id || ''}-${item.aluno_nome || ''}`;
                if (!grouped.has(key)) grouped.set(key, []);
                grouped.get(key).push(item);
            });

            let html = '<div class="simple-report-list">';
            grouped.forEach((items, key) => {
                const aluno = items[0];
                const turma = aluno.turma_nome || '';
                items.sort((a, b) => String(a.data_encaminhamento || '').localeCompare(String(b.data_encaminhamento || '')));
                html += `
                    <div class="simple-card">
                        <div class="simple-header">
                            <div><strong>Aluno:</strong> ${aluno.aluno_nome || '-'}</div>
                            <div><strong>Turma:</strong> ${turma || '-'}</div>
                        </div>
                        <div class="simple-lines">
                            ${items.map(buildSimpleLine).join('')}
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        function buildSimpleLine(item) {
            const parts = [];
            if (item.data_encaminhamento) parts.push(`Data: ${item.data_encaminhamento}`);
            if (item.professor_nome) parts.push(`Prof: ${item.professor_nome}`);
            if (item.motivos) parts.push(`Motivos: ${item.motivos}`);
            if (item.acoes_tomadas) parts.push(`Ações: ${item.acoes_tomadas}`);
            if (item.providencias) parts.push(`Providências: ${item.providencias}`);
            if (item.status) parts.push(`Status: ${item.status}`);
            if (item.codigo) parts.push(`Código: ${item.codigo}`);
            return `<div class="simple-line">${parts.join(' • ')}</div>`;
        }

        function buildFichaReport(data, layout) {
            const motivosBase = [
                "Indisciplina / Xingamentos",
                "Gazeando aula",
                "Agressão / Bullying / Discriminação",
                "Uso de celular / fone de ouvido",
                "Dificuldade de aprendizado",
                "Desrespeito com professor / profissionais da unidade escolar",
                "Não produz e não participa em sala"
            ];
            const acoesBase = [
                "Diálogo com o estudante",
                "Comunicado aos responsáveis",
                "Mensagem via WhatsApp"
            ];
            const providenciasBase = [
                "Solicitar comparecimento do responsável na escola",
                "Advertência"
            ];
            const stampText = new Date().toLocaleString('pt-BR');

            let reportHTML = '';
            const renderCard = (item) => {
                const motivos = parseList(item.motivos);
                const acoes = parseList(item.acoes_tomadas);
                const providencias = parseList(item.providencias);
                const outrosMotivo = motivos.find(m => m.startsWith('Outros:')) || '';
                const outrosAcoes = acoes.find(m => m.startsWith('Outros:')) || '';
                const outrosProvidencias = providencias.find(m => m.startsWith('Outros:')) || '';

                const registradoPor = item.registrado_por_nome || item.registrado_por || item.registrado_por_uid || '';
                return `
                    <div class="record-card">
                        <div class="ficha-header">
                            <div class="ficha-logo">
                                <img src="../apoia/logo.png" alt="Logo EEBGV">
                            </div>
                            <div class="ficha-header-text">
                                <div class="ficha-title">E.E.B GETÚLIO VARGAS</div>
                                <div class="ficha-subtitle">FICHA DE ENCAMINHAMENTO</div>
                            </div>
                        </div>
                        <div class="ficha-row">
                            <div class="ficha-field half"><strong>CÓDIGO:</strong> ${item.codigo || ''}</div>
                            <div class="ficha-field half"><strong>DATA:</strong> ${item.data_encaminhamento || ''}</div>
                        </div>
                        <div class="ficha-field"><strong>PROFESSOR(A):</strong> ${item.professor_nome || ''}</div>
                        <div class="ficha-row">
                            <div class="ficha-field half student"><strong>ESTUDANTE:</strong> ${item.aluno_nome || ''}</div>
                            <div class="ficha-field half turma"><strong>TURMA:</strong> ${item.turma_nome || ''}</div>
                        </div>

                        <div class="ficha-section">
                            <div class="section-title section-title-compact">O estudante acima citado foi direcionado à orientação educacional pelo(s) seguinte(s) motivo(s):</div>
                            <div class="checkbox-group two-cols">
                                ${motivosBase.map(m => checkbox(m, motivos.includes(m))).join('')}
                                ${checkbox('Outros', !!outrosMotivo)}
                            </div>
                            <div class="line-block">${outrosMotivo.replace('Outros:', '').trim() || ''}</div>
                            <div class="line-block">${item.detalhes_motivo || ''}</div>
                        </div>

                        <div class="ficha-section">
                            <div class="section-title">Encaminhamentos realizados na orientação/coordenação</div>
                            <div class="checkbox-group two-cols">
                                ${acoesBase.map(m => checkbox(m, acoes.includes(m))).join('')}
                            ${checkbox('Outros', !!outrosAcoes)}
                            </div>
                            <div class="line-block">${outrosAcoes.replace('Outros:', '').trim() || ''}</div>
                            <div class="ficha-field"><strong>RESPONSÁVEL:</strong> ${item.responsavel_nome || ''}</div>
                            <div class="ficha-field"><strong>TELEFONE:</strong> ${item.numero_telefone || ''}</div>
                            <div class="checkbox-row">
                                <span class="checkbox-label">HORÁRIO DO CONTATO:</span>
                                <span class="checkbox-value">${item.horario_ligacao || ''}</span>
                                ${checkbox('Atendeu', item.status_ligacao === 'Atendeu')}
                                ${checkbox('Não atendeu', item.status_ligacao === 'Não atendeu')}
                            </div>
                            <div class="checkbox-row">
                                <span class="checkbox-label">Mensagem via WhatsApp:</span>
                                ${checkbox('Enviada', !!item.whatsapp_enviado)}
                                ${checkbox('Respondeu', item.whatsapp_status === 'Respondeu')}
                                ${checkbox('Não respondeu', item.whatsapp_status === 'Não respondeu')}
                            </div>
                            <div class="checkbox-group two-cols">
                                ${providenciasBase.map(m => checkbox(m, providencias.includes(m))).join('')}
                                ${checkbox('Outros', !!outrosProvidencias)}
                            </div>
                            <div class="line-block">${outrosProvidencias.replace('Outros:', '').trim() || ''}</div>
                            <div class="line-block">${item.detalhes_acao || ''}</div>
                        </div>

                        <div class="ficha-section">
                            <div class="ficha-row">
                                <div class="ficha-field half"><strong>Data das diligências:</strong> ____ / ____ / ______</div>
                                <div class="ficha-field half"><strong>Status do documento:</strong> ${item.status || ''}</div>
                            </div>
                        </div>

                        <div class="print-stamp">Relatório de encaminhamento • ${stampText}${registradoPor ? ` • Registrado por: ${registradoPor}` : ''}</div>
                    </div>
                `;
            };

            if (layout === 'double') {
                for (let i = 0; i < data.length; i += 2) {
                    const first = data[i];
                    const second = data[i + 1];
                    reportHTML += `<div class="two-up-page">${renderCard(first)}${second ? renderCard(second) : ''}</div>`;
                }
            } else {
                data.forEach(item => { reportHTML += renderCard(item); });
            }
            return reportHTML;
        }
    </script>
</body>
</html>
