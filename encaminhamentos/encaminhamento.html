<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Encaminhamento</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <header class="bg-white shadow-md p-3 grid grid-cols-[auto_1fr_auto] items-center gap-2">
        <div class="flex items-center gap-3">
            <img src="../apoia/logo.png" alt="Logo Escola" class="h-12 w-12">
            <div>
                <h1 class="text-lg font-bold leading-tight">Encaminhamentos</h1>
                <p class="text-xs text-gray-500">Registrar</p>
            </div>
        </div>
        <nav class="flex flex-wrap justify-center gap-3 text-sm font-semibold">
            <a href="dashboard.html" class="text-gray-600 hover:text-blue-600">Dashboard</a>
            <a href="encaminhamento.html" class="text-blue-600 nav-link-active">Registrar</a>
            <a href="consulta.html" class="text-gray-600 hover:text-blue-600">Consultar</a>
            <a href="relatorios.html" class="text-gray-600 hover:text-blue-600">Relatórios</a>
        </nav>
        <div class="flex items-center gap-3 justify-end">
            <div class="text-right">
                <p class="text-xs text-gray-500">Usuário</p>
                <p class="text-sm font-semibold" id="user-name">-</p>
            </div>
            <button type="button" id="logout-btn" class="px-3 py-1.5 text-xs font-medium text-white bg-red-600 rounded-md hover:bg-red-700">Sair</button>
        </div>
    </header>

    <div class="px-4 py-6 max-w-4xl mx-auto">
        <div class="bg-white rounded-lg shadow-md p-6">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h2 class="text-xl font-bold text-gray-900" id="form-title">Registrar Encaminhamento</h2>
                    <p class="text-xs text-gray-500">Sync: <strong id="sync-status">-</strong></p>
                </div>
                <div class="text-sm text-gray-500">
                    Registrado por: <strong id="registradoPor"></strong>
                </div>
            </div>
            <form id="encaminhamentoForm" class="space-y-6">
            <input type="hidden" id="editId" name="editId">
                <div>
                    <h3 class="text-base font-semibold text-gray-900 border-b border-gray-200 pb-2">Dados do Encaminhamento</h3>
                    <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="dataEncaminhamento" class="text-sm font-medium text-gray-700">Data do Encaminhamento</label>
                            <input type="date" id="dataEncaminhamento" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label for="turma" class="text-sm font-medium text-gray-700">Turma</label>
                            <input type="text" id="turma" readonly class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm bg-gray-50">
                        </div>
                    </div>
                    <div class="mt-4">
                        <label for="professor" class="text-sm font-medium text-gray-700">Professor(a)</label>
                        <select id="professor" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                            <option value="">Carregando...</option>
                        </select>
                    </div>
                    <div class="mt-4">
                        <label for="estudante" class="text-sm font-medium text-gray-700">Estudante</label>
                        <select id="estudante" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                            <option value="">Carregando...</option>
                        </select>
                    </div>
                    <div class="mt-4">
                        <label class="text-sm font-medium text-gray-700">Motivo(s)</label>
                        <div class="mt-2 bg-gray-50 border border-gray-200 rounded-md p-3 grid grid-cols-1 md:grid-cols-2 gap-2" id="motivos-container"></div>
                    </div>
                    <div class="mt-4">
                        <label for="detalhesMotivo" class="text-sm font-medium text-gray-700">Detalhes do Motivo</label>
                        <textarea id="detalhesMotivo" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
                    </div>
                </div>

                <div>
                    <h3 class="text-base font-semibold text-gray-900 border-b border-gray-200 pb-2">Ações da Orientação</h3>
                    <div class="mt-4">
                        <label class="text-sm font-medium text-gray-700">Ações Imediatas</label>
                        <div class="mt-2 bg-gray-50 border border-gray-200 rounded-md p-3 grid grid-cols-1 md:grid-cols-2 gap-2" id="acoes-container"></div>
                    </div>
                    <div class="mt-4">
                        <label for="detalhesAcao" class="text-sm font-medium text-gray-700">Detalhes da Ação</label>
                        <textarea id="detalhesAcao" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
                    </div>
                    <h3 class="text-base font-semibold text-gray-900 border-b border-gray-200 pb-2 mt-6">Contato com Responsáveis</h3>
                    <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="numeroTelefone" class="text-sm font-medium text-gray-700">Número de telefone</label>
                            <input type="tel" id="numeroTelefone" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label for="horarioLigacao" class="text-sm font-medium text-gray-700">Horário da ligação</label>
                            <input type="time" id="horarioLigacao" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label for="statusLigacao" class="text-sm font-medium text-gray-700">Status da ligação</label>
                            <select id="statusLigacao" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                <option value="">Selecione</option>
                                <option value="Atendeu">Atendeu</option>
                                <option value="Não atendeu">Não atendeu</option>
                            </select>
                        </div>
                        <div>
                            <label for="recadoCom" class="text-sm font-medium text-gray-700">Deixou recado com:</label>
                            <input type="text" id="recadoCom" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>
                    <h3 class="text-base font-semibold text-gray-900 border-b border-gray-200 pb-2 mt-6">Providências Adicionais</h3>
                    <div class="mt-4 bg-gray-50 border border-gray-200 rounded-md p-3 grid grid-cols-1 md:grid-cols-2 gap-2" id="providencias-container"></div>
                    <div class="mt-4">
                        <label for="solicitacaoComparecimento" class="text-sm font-medium text-gray-700">Data e hora para comparecimento</label>
                        <input type="text" id="solicitacaoComparecimento" placeholder="Ex: 25/08/2025 às 14h30" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>

                <div>
                    <h3 class="text-base font-semibold text-gray-900 border-b border-gray-200 pb-2">Fechamento</h3>
                    <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="status" class="text-sm font-medium text-gray-700">Status do Encaminhamento</label>
                            <select id="status" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                <option value="Aberto">Aberto</option>
                                <option value="Em Acompanhamento">Em Acompanhamento</option>
                                <option value="Resolvido">Resolvido</option>
                                <option value="Arquivado">Arquivado</option>
                            </select>
                        </div>
                        <div>
                            <label for="registradoPor" class="text-sm font-medium text-gray-700">Registrado por</label>
                            <input type="text" id="registradoPor" readonly class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm bg-gray-50">
                        </div>
                    </div>
                    <div class="mt-4">
                        <label for="outrasInformacoes" class="text-sm font-medium text-gray-700">Outras Informações Relevantes</label>
                        <textarea id="outrasInformacoes" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" id="btnRegistrar" class="w-full py-2 px-4 font-semibold text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Registrar Encaminhamento</button>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3" id="editButtons">
                        <button type="button" id="btnSalvarEdicao" class="w-full py-2 px-4 font-semibold text-white bg-green-600 rounded-md hover:bg-green-700">Salvar Alterações</button>
                        <button type="button" id="btnCancelarEdicao" class="w-full py-2 px-4 font-semibold text-white bg-amber-500 rounded-md hover:bg-amber-600">Cancelar Edição</button>
                    </div>
                </div>
            </form>
            <div id="status-message"></div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
