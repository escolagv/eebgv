<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Encaminhamento</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>
<body class="bg-gray-200 text-gray-800">
    <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-20 md:hidden"></div>
    <div class="flex h-screen bg-gray-200">
        <aside class="w-64 bg-gray-800 text-white flex flex-col fixed inset-y-0 left-0 z-30 transform -translate-x-full transition-transform duration-300 ease-in-out md:relative md:translate-x-0">
            <div class="p-4 border-b border-gray-700 flex flex-col items-center gap-3">
                <img src="../apoia/logo_admin.png" alt="Logo da Escola" class="h-16">
                <div>
                    <h1 class="text-xl font-bold text-center">Encaminhamentos</h1>
                    <p id="user-name" class="text-sm text-gray-400 text-center">-</p>
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <a href="dashboard.html" class="block px-4 py-2 rounded-md hover:bg-gray-700">Dashboard</a>
                <a href="encaminhamento.html" class="block px-4 py-2 rounded-md bg-gray-700">Registrar</a>
                <a href="consulta.html" class="block px-4 py-2 rounded-md hover:bg-gray-700">Consultar</a>
                <a href="relatorios.html" class="block px-4 py-2 rounded-md hover:bg-gray-700">Relatórios</a>
            </nav>
            <div class="p-4 border-t border-gray-700 space-y-4">
                <div class="text-xs text-center text-gray-400">
                    <img src="../apoia/qr_code_altnix.png" alt="QR Code Altnix" class="h-16 mx-auto mb-2">
                    <p>Desenvolvido por:</p>
                    <p>Altnix Tecnologia</p>
                    <p>WhatsApp: (48) 99100-4780</p>
                </div>
                <button id="logout-btn" class="w-full px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700">Sair</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <button id="mobile-menu-btn" class="text-gray-600 hover:text-gray-800 md:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-md">
                    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4">
                        <div>
                            <h2 class="text-2xl font-bold" id="form-title">Registrar Encaminhamento</h2>
                            <div class="flex items-center gap-3 text-xs text-gray-500 mt-1">
                                <span>Sync: <strong id="sync-status">-</strong></span>
                                <button type="button" id="sync-now-btn" class="px-2 py-1 text-xs font-semibold text-blue-700 bg-blue-100 rounded-md hover:bg-blue-200">Sincronizar agora</button>
                            </div>
                        </div>
                        <div class="text-sm text-gray-500">
                            Registrado por: <strong id="registradoPorLabel"></strong>
                        </div>
                    </div>

                    <form id="encaminhamentoForm" class="space-y-6">
                        <input type="hidden" id="editId" name="editId">
                        <div>
                            <h3 class="text-base font-semibold text-gray-900 border-b border-gray-200 pb-2">Dados do Encaminhamento</h3>
                            <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label for="dataEncaminhamento" class="text-sm font-medium text-gray-700">Data do Encaminhamento</label>
                                    <input type="date" id="dataEncaminhamento" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                </div>
                                <div>
                                    <label for="professor" class="text-sm font-medium text-gray-700">Professor(a)</label>
                                    <select id="professor" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                        <option value="">Carregando...</option>
                                    </select>
                                    <button type="button" id="toggle-professor-search" class="mt-2 text-xs font-semibold text-blue-700 hover:text-blue-900">Encontrar professor</button>
                                    <div id="professor-search-panel" class="hidden mt-2 border border-gray-200 rounded-md bg-white p-2">
                                        <input type="text" id="professor-search-input" placeholder="Digite para filtrar..." class="w-full px-2 py-1 text-sm border border-gray-300 rounded-md">
                                        <div id="professor-search-list" class="mt-2 max-h-56 overflow-y-auto text-sm divide-y divide-gray-100"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-4">
                                <label for="estudante" class="text-sm font-medium text-gray-700">Estudante</label>
                                <select id="estudante" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                    <option value="">Carregando...</option>
                                </select>
                                <button type="button" id="toggle-aluno-search" class="mt-2 text-xs font-semibold text-blue-700 hover:text-blue-900">Encontrar aluno</button>
                                <div id="aluno-search-panel" class="hidden mt-2 border border-gray-200 rounded-md bg-white p-2">
                                    <input type="text" id="aluno-search-input" placeholder="Digite para filtrar..." class="w-full px-2 py-1 text-sm border border-gray-300 rounded-md">
                                    <div id="aluno-search-list" class="mt-2 max-h-56 overflow-y-auto text-sm divide-y divide-gray-100"></div>
                                </div>
                            </div>
                            <div class="mt-4">
                                <label class="text-sm font-medium text-gray-700">Motivo(s)</label>
                                <div class="mt-2 bg-gray-50 border border-gray-200 rounded-md p-3 grid grid-cols-1 md:grid-cols-2 gap-2" id="motivos-container"></div>
                            </div>
                            <div class="mt-4">
                                <label for="detalhesMotivo" class="text-sm font-medium text-gray-700">Detalhes do Motivo</label>
                                <textarea id="detalhesMotivo" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-base font-semibold text-gray-900 border-b border-gray-200 pb-2">Ações da Orientação</h3>
                            <div class="mt-4">
                                <label class="text-sm font-medium text-gray-700">Ações Imediatas</label>
                                <div class="mt-2 bg-gray-50 border border-gray-200 rounded-md p-3 grid grid-cols-1 md:grid-cols-2 gap-2" id="acoes-container"></div>
                            </div>
                            <div class="mt-4">
                                <label for="detalhesAcao" class="text-sm font-medium text-gray-700">Detalhes da Ação</label>
                                <textarea id="detalhesAcao" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
                            </div>
                            <h3 class="text-base font-semibold text-gray-900 border-b border-gray-200 pb-2 mt-6">Contato com Responsáveis</h3>
                            <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label for="responsavelNome" class="text-sm font-medium text-gray-700">Responsável</label>
                                    <input type="text" id="responsavelNome" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                </div>
                                <div>
                                    <label for="numeroTelefone" class="text-sm font-medium text-gray-700">Número de telefone</label>
                                    <input type="tel" id="numeroTelefone" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                </div>
                                <div>
                                    <label for="horarioLigacao" class="text-sm font-medium text-gray-700">Horário da ligação</label>
                                    <input type="time" id="horarioLigacao" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                </div>
                                <div>
                                    <label for="statusLigacao" class="text-sm font-medium text-gray-700">Status da ligação</label>
                                    <select id="statusLigacao" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                        <option value="">Selecione</option>
                                        <option value="Atendeu">Atendeu</option>
                                        <option value="Não atendeu">Não atendeu</option>
                                    </select>
                                </div>
                                <div>
                                    <label for="recadoCom" class="text-sm font-medium text-gray-700">Deixou recado com:</label>
                                    <input type="text" id="recadoCom" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                </div>
                                <div>
                                    <label class="text-sm font-medium text-gray-700">Mensagem via WhatsApp</label>
                                    <div class="mt-2 flex flex-wrap items-center gap-4 text-sm text-gray-700">
                                        <label class="inline-flex items-center gap-2">
                                            <input type="checkbox" id="whatsapp-enviado" class="h-4 w-4">
                                            Enviado
                                        </label>
                                        <label class="inline-flex items-center gap-2">
                                            <input type="radio" name="whatsapp-status" value="Respondeu" class="h-4 w-4" disabled>
                                            Respondeu
                                        </label>
                                        <label class="inline-flex items-center gap-2">
                                            <input type="radio" name="whatsapp-status" value="Não respondeu" class="h-4 w-4" disabled>
                                            Não respondeu
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-4">
                                <label for="contatoResumo" class="text-sm font-medium text-gray-700">Resumo do contato</label>
                                <input type="text" id="contatoResumo" readonly class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm bg-gray-50">
                            </div>
                            <h3 class="text-base font-semibold text-gray-900 border-b border-gray-200 pb-2 mt-6">Providências Adicionais</h3>
                            <div class="mt-4 bg-gray-50 border border-gray-200 rounded-md p-3 grid grid-cols-1 md:grid-cols-2 gap-2" id="providencias-container"></div>
                            <div class="mt-4">
                                <label class="text-sm font-medium text-gray-700">Data e hora para comparecimento</label>
                                <div class="mt-1 grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <input type="date" id="solicitacaoComparecimentoData" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                    <input type="time" id="solicitacaoComparecimentoHora" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                </div>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-base font-semibold text-gray-900 border-b border-gray-200 pb-2">Fechamento</h3>
                            <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label for="status" class="text-sm font-medium text-gray-700">Status do Encaminhamento</label>
                                    <select id="status" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                        <option value="Aberto">Aberto</option>
                                        <option value="Em Acompanhamento">Em Acompanhamento</option>
                                        <option value="Resolvido">Resolvido</option>
                                        <option value="Arquivado">Arquivado</option>
                                    </select>
                                </div>
                                <div>
                                    <label for="registradoPor" class="text-sm font-medium text-gray-700">Registrado por</label>
                                    <input type="text" id="registradoPor" readonly class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm bg-gray-50">
                                </div>
                            </div>
                            <div class="mt-4">
                                <label for="outrasInformacoes" class="text-sm font-medium text-gray-700">Outras Informações Relevantes</label>
                                <textarea id="outrasInformacoes" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
                            </div>
                        </div>

                        <div class="pt-2">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                <button type="submit" id="btnRegistrar" class="w-full py-2 px-4 font-semibold text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Registrar Encaminhamento</button>
                                <button type="button" id="btnSalvarEdicao" class="w-full py-2 px-4 font-semibold text-white bg-green-600 rounded-md hover:bg-green-700 opacity-50 cursor-not-allowed" disabled>Salvar Alterações</button>
                            </div>
                        </div>
                    </form>
                    <div id="status-message"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/sidebar.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
